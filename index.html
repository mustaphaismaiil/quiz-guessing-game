<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Quiz Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="quiz-app">
    <header>
      <h1>Quiz Quest</h1>
      <p>Test your knowledge with a fun interactive quiz that uses functions, arrays, objects, loops, and conditional logic.</p>
    </header>

    <section class="quiz-card hidden" id="quiz-card">
      <div class="meta">
        <span id="question-number">Question 1</span>
        <span id="score">Score: 0</span>
      </div>
      <h2 id="question-text"></h2>
      <div id="answers" class="answers"></div>
      <button id="next-btn" class="primary-btn">Next Question</button>
    </section>

    <section class="start-card" id="start-card">
      <p>Ready to begin? Click the button to start the quiz and see how many you can get right.</p>
      <button id="start-btn" class="primary-btn">Start Quiz</button>
    </section>

    <section class="result-card hidden" id="result-card">
      <h2>Quiz Complete!</h2>
      <p id="result-text"></p>
      <button id="restart-btn" class="primary-btn">Try Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
